<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Вход — ВайбКаст</title>
<link rel="icon" type="image/png" href="assets/vibeflow-logo.png?v=2" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Public+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="vc-mark" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="19" fill="#2A241B"/>
      <circle cx="20" cy="20" r="19" fill="none" stroke="#C2674A" stroke-opacity=".35" stroke-width="1"/>
      <g stroke="#F3E6CF" stroke-linecap="round" stroke-width="1.6">
        <line x1="11" y1="20" x2="11" y2="20"/>
        <line x1="14" y1="17" x2="14" y2="23"/>
        <line x1="17" y1="14" x2="17" y2="26"/>
        <line x1="20" y1="11" x2="20" y2="29" stroke="#E8BFAC"/>
        <line x1="23" y1="15" x2="23" y2="25"/>
        <line x1="26" y1="18" x2="26" y2="22"/>
        <line x1="29" y1="20" x2="29" y2="20"/>
      </g>
      <circle cx="30.5" cy="11.5" r="2.2" fill="#C2674A"/>
    </symbol>
  </defs>
</svg>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <svg class="mark" viewBox="0 0 40 40"><use href="#vc-mark"/></svg>
    <span class="name">Вайб<em>Каст</em></span>
  </a>
  <div class="nav-right">
    <a class="nav-signin" href="register.html">Зарегистрироваться</a>
  </div>
</nav>

<main class="auth-shell">
  <div class="auth-card fade d1">
    <div class="auth-card-head">
      <h1>Войти в <em>ВайбКаст</em></h1>
      <p>Введи email и пароль от своего аккаунта. Подписка подтянется автоматически.</p>
    </div>

    <div id="form-error" class="form-error" style="display:none"></div>

    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="ты@example.com" />
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" minlength="8" placeholder="минимум 8 символов" />
      </div>

      <div class="auth-submit-row">
        <button type="submit" class="btn-primary" id="submit-btn">
          Войти
        </button>
      </div>
    </form>

    <p class="auth-footer-line">
      Ещё нет аккаунта? <a href="register.html">Создать</a>
    </p>
  </div>
</main>

<script src="assets/api.js"></script>
<script>
  if (VF.auth.isAuthenticated()) {
    window.location.replace('account.html');
  }

  const form = document.getElementById('login-form');
  const errorBox = document.getElementById('form-error');
  const submitBtn = document.getElementById('submit-btn');

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }
  function clearError() {
    errorBox.textContent = '';
    errorBox.style.display = 'none';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();
    const email = form.email.value.trim();
    const password = form.password.value;
    if (!email || !password) {
      showError('Заполни email и пароль');
      return;
    }
    submitBtn.disabled = true;
    submitBtn.textContent = 'Заходим…';
    try {
      await VF.login(email, password);
      window.location.replace('account.html');
    } catch (err) {
      showError(err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Войти';
    }
  });
</script>

</body>
</html>
