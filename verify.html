<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Подтверждение почты — ВайбВиспр</title>
<link rel="icon" type="image/png" href="assets/vibewispr-logo.png?v=2" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Public+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css" />
<style>
.code-row{
  display: flex;
  gap: 8px;
  justify-content: center;
  margin: 28px 0 18px;
}
.code-row input{
  width: 48px;
  height: 60px;
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 500;
  text-align: center;
  background: var(--paper);
  border: 1px solid var(--hair);
  border-radius: 10px;
  color: var(--ink);
  outline: none;
  transition: border-color .15s ease, box-shadow .15s ease;
}
.code-row input:focus{
  border-color: var(--coral-deep);
  box-shadow: 0 0 0 3px rgba(161, 78, 51, 0.12);
}
.code-row input.filled{
  background: #FAF6ED;
}
.resend-row{
  text-align: center;
  font-size: 12.5px;
  color: var(--warm);
  margin-top: 14px;
}
.resend-row button{
  background: none;
  border: none;
  color: var(--coral-deep);
  cursor: pointer;
  font-family: inherit;
  font-size: inherit;
  text-decoration: underline;
  text-decoration-color: rgba(161, 78, 51, 0.4);
  text-underline-offset: 2px;
}
.resend-row button:hover{ text-decoration-color: var(--coral-deep); }
.resend-row button:disabled{ color: var(--muted); cursor: not-allowed; text-decoration: none; }
.email-hint{
  text-align: center;
  font-size: 13px;
  color: var(--warm);
  margin-bottom: 8px;
}
.email-hint strong{ color: var(--ink); }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="vw-mark" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="19" fill="#2A241B"/>
      <circle cx="20" cy="20" r="19" fill="none" stroke="#C2674A" stroke-opacity=".35" stroke-width="1"/>
      <g stroke="#F3E6CF" stroke-linecap="round" stroke-width="1.6">
        <line x1="11" y1="20" x2="11" y2="20"/>
        <line x1="14" y1="17" x2="14" y2="23"/>
        <line x1="17" y1="14" x2="17" y2="26"/>
        <line x1="20" y1="11" x2="20" y2="29" stroke="#E8BFAC"/>
        <line x1="23" y1="15" x2="23" y2="25"/>
        <line x1="26" y1="18" x2="26" y2="22"/>
        <line x1="29" y1="20" x2="29" y2="20"/>
      </g>
      <circle cx="30.5" cy="11.5" r="2.2" fill="#C2674A"/>
    </symbol>
  </defs>
</svg>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <svg class="mark" viewBox="0 0 40 40"><use href="#vw-mark"/></svg>
    <span class="name">Вайб<em>Виспр</em></span>
  </a>
  <div class="nav-right">
    <a class="nav-signin" href="login.html">Войти</a>
  </div>
</nav>

<main class="auth-shell">
  <div class="auth-card fade d1">
    <div class="auth-card-head">
      <h1>Введи <em>код</em></h1>
      <p>Отправили 6-значный код на твой email. Загляни в почту — должно прийти за секунду-другую.</p>
    </div>

    <div class="email-hint">
      Письмо на <strong id="email-display">—</strong>
    </div>

    <div id="form-error" class="form-error" style="display:none"></div>

    <div class="code-row" id="code-row">
      <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" />
      <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" />
      <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" />
      <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" />
      <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" />
      <input type="text" inputmode="numeric" pattern="[0-9]" maxlength="1" autocomplete="one-time-code" />
    </div>

    <div class="resend-row">
      Не пришёл код?
      <button type="button" id="resend-btn">Прислать ещё раз</button>
    </div>
  </div>
</main>

<script src="assets/api.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const email = (params.get('email') || '').toLowerCase();

  if (!email) {
    window.location.replace('register.html');
  }
  document.getElementById('email-display').textContent = email;

  if (VF.auth.isAuthenticated()) {
    window.location.replace('account.html');
  }

  const inputs = Array.from(document.querySelectorAll('#code-row input'));
  const errorBox = document.getElementById('form-error');
  const resendBtn = document.getElementById('resend-btn');
  let resendCooldown = 0;
  let isSubmitting = false;

  function showError(msg) { errorBox.textContent = msg; errorBox.style.display = 'block'; }
  function clearError() { errorBox.textContent = ''; errorBox.style.display = 'none'; }

  inputs.forEach((input, idx) => {
    input.addEventListener('input', (e) => {
      const v = input.value.replace(/\D/g, '').slice(0, 1);
      input.value = v;
      if (v) {
        input.classList.add('filled');
        // Двигаемся к следующему
        if (idx < inputs.length - 1) inputs[idx + 1].focus();
        // Если все 6 заполнены — отправляем
        if (inputs.every(i => i.value)) submit();
      } else {
        input.classList.remove('filled');
      }
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !input.value && idx > 0) {
        inputs[idx - 1].focus();
        inputs[idx - 1].value = '';
        inputs[idx - 1].classList.remove('filled');
      } else if (e.key === 'ArrowLeft' && idx > 0) {
        inputs[idx - 1].focus();
      } else if (e.key === 'ArrowRight' && idx < inputs.length - 1) {
        inputs[idx + 1].focus();
      }
    });

    input.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text');
      const digits = text.replace(/\D/g, '').slice(0, 6).split('');
      inputs.forEach((ip, i) => {
        ip.value = digits[i] || '';
        if (digits[i]) ip.classList.add('filled');
        else ip.classList.remove('filled');
      });
      if (digits.length === 6) submit();
      else if (digits.length > 0) inputs[Math.min(digits.length, 5)].focus();
    });
  });

  inputs[0].focus();

  async function submit() {
    if (isSubmitting) return;
    const code = inputs.map(i => i.value).join('');
    if (code.length !== 6) return;
    isSubmitting = true;
    clearError();
    inputs.forEach(i => i.disabled = true);
    try {
      await VF.verifyEmail(email, code);
      window.location.replace('account.html?welcome=1');
    } catch (err) {
      isSubmitting = false;
      inputs.forEach(i => i.disabled = false);
      if (err.code === 'wrong_code' && typeof err.remainingAttempts === 'number') {
        showError(`Код неверный. Осталось попыток: ${err.remainingAttempts}`);
      } else if (err.code === 'code_expired') {
        showError('Код истёк. Запроси новый.');
      } else if (err.code === 'too_many_attempts') {
        showError('Слишком много попыток. Запроси новый код.');
      } else if (err.code === 'already_verified') {
        VF.showToast('Аккаунт уже активирован', 'info');
        setTimeout(() => window.location.replace('login.html'), 1000);
      } else {
        showError(err.message);
      }
      inputs.forEach(i => { i.value = ''; i.classList.remove('filled'); });
      inputs[0].focus();
    }
  }

  resendBtn.addEventListener('click', async () => {
    if (resendCooldown > 0) return;
    clearError();
    resendBtn.disabled = true;
    try {
      await VF.resendVerificationCode(email);
      VF.showToast('Новый код отправлен', 'info', 3000);
      // 30 секунд cooldown чтобы не спамить
      resendCooldown = 30;
      const tick = setInterval(() => {
        resendCooldown -= 1;
        if (resendCooldown <= 0) {
          clearInterval(tick);
          resendBtn.textContent = 'Прислать ещё раз';
          resendBtn.disabled = false;
        } else {
          resendBtn.textContent = `Прислать ещё раз (${resendCooldown}с)`;
        }
      }, 1000);
    } catch (err) {
      resendBtn.disabled = false;
      showError(err.message);
    }
  });
</script>

</body>
</html>
