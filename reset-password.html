<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Новый пароль — ВайбВиспр</title>
<link rel="icon" type="image/png" href="assets/vibewispr-logo.png?v=2" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Public+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <symbol id="vw-mark" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="19" fill="#2A241B"/>
      <circle cx="20" cy="20" r="19" fill="none" stroke="#C2674A" stroke-opacity=".35" stroke-width="1"/>
      <g stroke="#F3E6CF" stroke-linecap="round" stroke-width="1.6">
        <line x1="11" y1="20" x2="11" y2="20"/>
        <line x1="14" y1="17" x2="14" y2="23"/>
        <line x1="17" y1="14" x2="17" y2="26"/>
        <line x1="20" y1="11" x2="20" y2="29" stroke="#E8BFAC"/>
        <line x1="23" y1="15" x2="23" y2="25"/>
        <line x1="26" y1="18" x2="26" y2="22"/>
        <line x1="29" y1="20" x2="29" y2="20"/>
      </g>
      <circle cx="30.5" cy="11.5" r="2.2" fill="#C2674A"/>
    </symbol>
  </defs>
</svg>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <svg class="mark" viewBox="0 0 40 40"><use href="#vw-mark"/></svg>
    <span class="name">Вайб<em>Виспр</em></span>
  </a>
  <div class="nav-right">
    <a class="nav-signin" href="login.html">Войти</a>
  </div>
</nav>

<main class="auth-shell">
  <div class="auth-card fade d1">
    <div class="auth-card-head">
      <h1>Новый <em>пароль</em></h1>
      <p>Придумай новый пароль — минимум 8 символов. После сохранения войди в аккаунт с новым паролем.</p>
    </div>

    <div id="form-error" class="form-error" style="display:none"></div>

    <div id="no-token" style="display:none; padding:16px; background:rgba(168,65,44,0.08); border:1px solid rgba(168,65,44,0.25); border-radius:10px; font-size:14px; color:var(--ink-2,#4B4339); margin-bottom:18px;">
      Ссылка некорректна. Открой её из письма, либо <a href="forgot-password.html">запроси новую</a>.
    </div>

    <form id="reset-form" novalidate>
      <div class="field">
        <label for="password">Новый пароль</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8" placeholder="минимум 8 символов" />
      </div>
      <div class="field">
        <label for="password2">Повтори пароль</label>
        <input type="password" id="password2" name="password2" required autocomplete="new-password" minlength="8" placeholder="ещё раз" />
      </div>

      <div class="auth-submit-row">
        <button type="submit" class="btn-primary" id="submit-btn">
          Установить пароль
        </button>
      </div>
    </form>

    <p class="auth-footer-line">
      <a href="login.html">← Вернуться к входу</a>
    </p>
  </div>
</main>

<script src="assets/api.js?v=4"></script>
<script>
  const params = new URLSearchParams(location.search);
  const token = params.get('token');

  if (!token) {
    document.getElementById('no-token').style.display = 'block';
    document.getElementById('reset-form').style.display = 'none';
  }

  const form = document.getElementById('reset-form');
  const errorBox = document.getElementById('form-error');
  const submitBtn = document.getElementById('submit-btn');

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';
    const p1 = form.password.value;
    const p2 = form.password2.value;
    if (p1.length < 8) { showError('Минимум 8 символов'); return; }
    if (p1 !== p2) { showError('Пароли не совпадают'); return; }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Сохраняем…';
    try {
      const res = await VF.resetPassword(token, p1);
      VF.showToast(res.message || 'Пароль обновлён. Войди в аккаунт.', 'info', 4500);
      setTimeout(() => window.location.replace('login.html'), 1500);
    } catch (err) {
      showError(err.message);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Установить пароль';
    }
  });
</script>

</body>
</html>
